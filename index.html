<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyme Visualization | Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.css">
    
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #eaeaea;
            --text-muted: #888888;
            --font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 4%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            color: var(--text-main);
            line-height: 1;
        }

        .logo span {
            display: block;
            font-weight: 300;
            font-size: 16px;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        nav { display: flex; gap: 30px; }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        nav a:hover { color: var(--text-muted); }

        main {
            padding: 20px 4% 100px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .grid-item a { display: block; }

        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
            transition: opacity 0.3s ease;
        }

        .grid-item img:hover { opacity: 0.85; }

        .caption { font-size: 12px; color: var(--text-muted); }
        .caption strong { color: var(--text-main); font-weight: 600; }

        @media (max-width: 900px) { .portfolio-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .portfolio-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            POLYME
            <span>VISUALIZATION</span>
        </a>
        <nav>
            <a href="#">Portfolio</a>
            <a href="#">Demo Reel</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Shot Breakdown</a>
        </nav>
    </header>

    <main>
        <div class="portfolio-grid">
            <div class="grid-item">
                <a href="https://images.unsplash.com/photo-1519999482648-25049ddd37b1?auto=format&fit=crop&w=1600&q=80">
                    <img src="https://images.unsplash.com/photo-1519999482648-25049ddd37b1?auto=format&fit=crop&w=800&q=80" alt="Linyi Mall">
                </a>
                <div class="caption"><strong>Linyi Mall</strong> | Linyi, China</div>
            </div>

            <div class="grid-item">
                <a href="https://images.unsplash.com/photo-1441982647708-2b02008f58b0?auto=format&fit=crop&w=1600&q=80">
                    <img src="https://images.unsplash.com/photo-1441982647708-2b02008f58b0?auto=format&fit=crop&w=800&q=80" alt="Linyi Mall">
                </a>
                <div class="caption"><strong>Linyi Mall</strong> | Linyi, China</div>
            </div>

            <div class="grid-item">
                <a href="https://images.unsplash.com/photo-1508344928928-7165b67de128?auto=format&fit=crop&w=1600&q=80">
                    <img src="https://images.unsplash.com/photo-1508344928928-7165b67de128?auto=format&fit=crop&w=800&q=80" alt="Sports Park">
                </a>
                <div class="caption"><strong>Dignity Health Sports Park</strong> | Carson, CA</div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.js"></script>
    <script>
        var lightbox = new SimpleLightbox('.portfolio-grid a', {});
    </script>
</body>
</html>
