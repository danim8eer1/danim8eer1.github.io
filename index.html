<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyme Visualization</title>
    <style>
        /* Dark Mode Colors */
        body { background: #121212; color: #eaeaea; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        header { padding: 40px 5%; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo { font-size: 30px; font-weight: bold; line-height: 1.1; color: #fff; }
        .logo span { font-size: 14px; font-weight: normal; letter-spacing: 2px; color: #888; }
        nav { font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
        nav a { margin-left: 25px; text-decoration: none; color: #eaeaea; }

        /* Horizontal Carousel Layout */
        .carousel-container { 
            display: flex; 
            overflow-x: auto; 
            gap: 20px; 
            padding: 20px 5% 60px; 
            scroll-snap-type: x mandatory; 
        }
        .grid-item { min-width: 33%; scroll-snap-align: start; }
        .grid-item img { width: 100%; height: auto; display: block; }
        .caption { font-size: 12px; margin-top: 10px; color: #888; }
        
        /* Hide scrollbar for a cleaner look */
        .carousel-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">POLYME<br><span>VISUALIZATION</span></div>
        <nav>
            <a href="#">Portfolio</a>
            <a href="#">Demo Reel</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Shot Breakdown</a>
        </nav>
    </header>

    <main>
        <div class="carousel-container">
            <!-- Project 1 -->
            <div class="grid-item">
                <img src="images/8_Shenton_Way_Aerial.webp" alt="8 Shenton Way">
                <div class="caption">8 Shenton Way | Singapore</div>
            </div>
            <!-- Project 2 -->
            <div class="grid-item">
                <img src="images/Aerial_02.webp" alt="Aerial View">
                <div class="caption">Aerial View | Cityscape</div>
            </div>
            <!-- Project 3 -->
            <div class="grid-item">
                <img src="images/Atrium_View-FINAL.webp" alt="Atrium View">
                <div class="caption">Atrium View | Interior</div>
            </div>
            <!-- Add more project blocks following this pattern -->
        </div>
    </main>

</body>
</html>
