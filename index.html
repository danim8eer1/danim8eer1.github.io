<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyme Visualization</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.css">
    <style>
        body { background: #121212; color: #eaeaea; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        header { padding: 40px 5%; display: flex; justify-content: space-between; align-items: flex-end; }
        .logo { font-size: 30px; font-weight: bold; line-height: 1.1; color: #fff; }
        .logo span { font-size: 14px; font-weight: normal; letter-spacing: 2px; color: #888; }
        nav { font-size: 12px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
        nav a { margin-left: 25px; text-decoration: none; color: #eaeaea; }

        .carousel-container { display: flex; overflow-x: auto; gap: 20px; padding: 20px 5% 60px; scroll-snap-type: x mandatory; }
        .grid-item { min-width: 400px; scroll-snap-align: start; position: relative; }
        
        .grid-item a { display: block; height: 400px; overflow: hidden; position: relative; }
        /* Plus icon overlay */
        .grid-item a::after { content: '+'; position: absolute; top: 10px; right: 10px; color: white; font-size: 24px; background: rgba(0,0,0,0.5); width: 30px; height: 30px; text-align: center; border-radius: 50%; pointer-events: none; }
        
        .grid-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .caption { font-size: 12px; margin-top: 10px; color: #888; }
        .carousel-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">POLYME<br><span>VISUALIZATION</span></div>
        <nav>
            <a href="#">Portfolio</a>
            <a href="#">Demo Reel</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Shot Breakdown</a>
        </nav>
    </header>

    <main>
        <div class="carousel-container">
            <!-- Ordered Project List -->
            <div class="grid-item"><a href="images/Atrium_View-FINAL.webp"><img src="images/Atrium_View-FINAL.webp"></a></div>
            <div class="grid-item"><a href="images/Corridor_03-FINAL.webp"><img src="images/Corridor_03-FINAL.webp"></a></div>
            <div class="grid-item"><a href="images/LA-Galaxy-Supporters-Section-1024x576.webp"><img src="images/LA-Galaxy-Supporters-Section-1024x576.webp"></a></div>
            <div class="grid-item"><a href="images/D_OOUA7UYAE88BX.webp"><img src="images/D_OOUA7UYAE88BX.webp"></a></div>
            <div class="grid-item"><a href="images/image-asset.webp"><img src="images/image-asset.webp"></a></div>
            <div class="grid-item"><a href="images/Wayfarer_DTLA-BM_Lilly_Rose.webp"><img src="images/Wayfarer_DTLA-BM_Lilly_Rose.webp"></a></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.js"></script>
    <script>var lightbox = new SimpleLightbox('.carousel-container a', { captionDelay: 250, animationSlide: true });</script>
</body>
</html>
