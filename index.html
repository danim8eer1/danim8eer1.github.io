<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyme Visualization</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.css">
    <style>
        body { background: #121212; color: #eaeaea; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        
        header { padding: 40px 5% 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .logo-img { height: 60px; width: auto; display: block; }
        
        nav { font-size: 16px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 10px; }
        nav a { margin-left: 40px; text-decoration: none; color: #eaeaea; }

        .carousel-wrapper { position: relative; padding: 0 5%; }
        
        .carousel-container { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 30px; scroll-behavior: smooth; padding-bottom: 20px; }
        .carousel-container::-webkit-scrollbar { display: none; }
        .carousel-container { scrollbar-width: none; }

        .grid-item { flex: 0 0 auto; position: relative; height: 700px; }
        .grid-item a { display: block; height: 600px; position: relative; }
        .grid-item a::after { content: '+'; position: absolute; top: 10px; right: 10px; color: white; font-size: 30px; background: rgba(0,0,0,0.5); width: 45px; height: 45px; line-height: 45px; text-align: center; border-radius: 50%; pointer-events: none; }
        .grid-item img { height: 100%; width: auto; object-fit: contain; display: block; }
        .caption { font-size: 16px; margin-top: 15px; color: #888; white-space: nowrap; }

        .nav-btn { position: absolute; top: 35%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: white; border: none; padding: 30px; cursor: pointer; z-index: 10; font-size: 24px; }
        .prev { left: 0%; }
        .next { right: 0%; }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
            nav { text-align: center; margin-top: 0; }
            nav a { margin: 0 10px; font-size: 14px; }
            .carousel-container { flex-direction: column; overflow-x: visible; }
            .grid-item { height: auto; margin-bottom: 40px; }
            .grid-item a { height: auto; }
            .grid-item img { width: 100%; height: auto; }
            .nav-btn { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="images/20190406_polyme-logo.png" alt="Polyme Visualization" class="logo-img"></a>
        <nav>
            <a href="index.html">Portfolio</a>
            <a href="demoreel.html">Demo Reel</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="carousel-wrapper">
        <button class="nav-btn prev" onclick="scrollCarousel(-1)">&#10094;</button>
        <div class="carousel-container" id="carousel">
             <!-- Projects remain the same -->
        </div>
        <button class="nav-btn next" onclick="scrollCarousel(1)">&#10095;</button>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.js"></script>
    <script>
        var lightbox = new SimpleLightbox('.carousel-container a', { captionDelay: 250 });
        function scrollCarousel(direction) {
            const container = document.getElementById('carousel');
            container.scrollBy({ left: direction * 800, behavior: 'smooth' });
        }
    </script>
</body>
</html>
