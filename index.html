<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyme Visualization</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.css">
    <style>
        body { background: #121212; color: #eaeaea; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        
        /* Header Setup */
        header { padding: 40px 5% 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .logo-img { height: 60px; width: auto; display: block; }
        
        nav { font-size: 16px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 10px; }
        nav a { margin-left: 40px; text-decoration: none; color: #eaeaea; }

        /* Carousel Setup */
        .carousel-wrapper { position: relative; padding: 0 5%; }
        /* Changed overflow-x to auto so it scrolls */
        .carousel-container { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 30px; scroll-behavior: smooth; padding-bottom: 20px; }
        
        .grid-item { flex: 0 0 auto; position: relative; height: 350px; }
        .grid-item a { display: block; height: 300px; position: relative; }
        .grid-item a::after { content: '+'; position: absolute; top: 10px; right: 10px; color: white; font-size: 20px; background: rgba(0,0,0,0.5); width: 30px; height: 30px; line-height: 30px; text-align: center; border-radius: 50%; pointer-events: none; }
        .grid-item img { height: 100%; width: auto; object-fit: contain; display: block; }
        
        .caption { font-size: 14px; margin-top: 10px; color: #888; white-space: nowrap; }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="images/20190406_polyme-logo.webp" alt="Polyme Visualization" class="logo-img">
        </a>
        <nav>
            <a href="#">Portfolio</a>
            <a href="#">Demo Reel</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">Shot Breakdown</a>
        </nav>
    </header>

    <main class="carousel-wrapper">
        <div class="carousel-container" id="carousel">
            <div class="grid-item"><a href="images/Atrium_View-FINAL.webp"><img src="images/Atrium_View-FINAL.webp"></a><div class="caption">Linyi Mall | Linyi, China</div></div>
            <div class="grid-item"><a href="images/Corridor_03-FINAL.webp"><img src="images/Corridor_03-FINAL.webp"></a><div class="caption">Linyi Mall | Linyi, China</div></div>
            <div class="grid-item"><a href="images/LA-Galaxy-Supporters-Section-1024x576.webp"><img src="images/LA-Galaxy-Supporters-Section-1024x576.webp"></a><div class="caption">Dignity Health Sports Park | Carson, CA</div></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.3/simple-lightbox.min.js"></script>
    <script>
        var lightbox = new SimpleLightbox('.carousel-container a', { captionDelay: 250 });
    </script>
</body>
</html>
