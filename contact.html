<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Polyme Visualization</title>
    <style>
        body { background: #121212; color: #eaeaea; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; min-height: 100vh; }
        
        header { padding: 40px 5% 40px; display: flex; justify-content: space-between; align-items: flex-start; }
        .logo-img { height: 60px; width: auto; display: block; }
        
        nav { font-size: 16px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 10px; }
        nav a { margin-left: 40px; text-decoration: none; color: #eaeaea; }

        .contact-wrapper { padding: 40px 10%; display: flex; gap: 80px; max-width: 1000px; margin: 0 auto; align-items: flex-start; }
        
        .contact-text { flex: 1; }
        .contact-text h1 { font-size: 24px; margin-bottom: 20px; }
        .contact-text p { color: #888; line-height: 1.6; }

        .contact-form { flex: 2; }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; background: transparent; border: 1px solid #333; padding: 10px; color: #fff; box-sizing: border-box; }
        textarea { height: 150px; resize: vertical; }
        
        button { background: #fff; color: #000; border: none; padding: 10px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #ccc; }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            header { flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
            nav { text-align: center; margin-top: 0; }
            nav a { margin: 0 10px; font-size: 14px; }
            .contact-wrapper { flex-direction: column; padding: 20px; gap: 40px; }
            .form-row { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">
            <img src="images/20190406_polyme-logo.png" alt="Polyme Visualization" class="logo-img">
        </a>
        <nav>
            <a href="index.html">Portfolio</a>
            <a href="demoreel.html">Demo Reel</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="contact-wrapper">
        <div class="contact-text">
            <h1>Contact Me</h1>
            <p>I love sharing the work that I do and how I do it. Please feel free to contact me using this online form.</p>
        </div>

        <form class="contact-form" action="#" method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name (required)</label>
                    <input type="text" name="first-name" required>
                </div>
                <div class="form-group">
                    <label>Last Name (required)</label>
                    <input type="text" name="last-name" required>
                </div>
            </div>
            <div class="form-group">
                <label>Subject (required)</label>
                <input type="text" name="subject" required>
            </div>
            <div class="form-group">
                <label>Message (required)</label>
                <textarea name="message" required></textarea>
            </div>
            <button type="submit">Submit</button>
        </form>
    </main>

</body>
</html>
